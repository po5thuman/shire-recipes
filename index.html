<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Shire Recipes</title>
  <style>
    :root {
      --bg-color: #f4f6f8;
      --card-bg: #ffffff;
      --text-color: #2c3e50;
      --primary-color: #2e7d32;
      --tag-bg: #e8f5e9;
      --border-radius: 12px;
      --shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      min-height: 100vh;
    }

    /* Layout Wrapper */
    .app-container {
      display: flex;
      width: 100%;
    }

    /* Sidebar Styling */
    aside {
      width: 260px;
      background-color: var(--card-bg);
      padding: 30px 20px;
      border-right: 1px solid #e0e0e0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    aside h2 {
      margin-bottom: 20px;
      font-size: 1.2rem;
      color: var(--primary-color);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .filter-btn {
      display: block;
      width: 100%;
      padding: 10px 15px;
      margin-bottom: 8px;
      background: none;
      border: 1px solid transparent;
      border-radius: 6px;
      text-align: left;
      font-size: 0.95rem;
      cursor: pointer;
      color: var(--text-color);
      transition: all 0.2s ease;
    }

    .filter-btn:hover {
      background-color: var(--bg-color);
    }

    .filter-btn.active {
      background-color: var(--primary-color);
      color: white;
      font-weight: bold;
    }

    /* Main Content Area */
    main {
      flex: 1;
      padding: 40px;
      overflow-y: auto;
    }

    header {
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2.2rem;
      color: var(--text-color);
      margin-bottom: 8px;
    }

    /* Recipes Grid */
    .recipes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 30px;
    }

    /* Recipe Card Styling */
    .recipe-card {
      background-color: var(--card-bg);
      border-radius: var(--border-radius);
      box-shadow: var(--shadow);
      padding: 25px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border: 1px solid #eaeaea;
    }

    .recipe-card-header h3 {
      font-size: 1.3rem;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 15px;
    }

    .card-tag {
      background-color: var(--tag-bg);
      color: var(--primary-color);
      font-size: 0.8rem;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    .recipe-card ul {
      list-style-type: none;
      margin-bottom: 20px;
    }

    .recipe-card li {
      font-size: 0.9rem;
      padding: 6px 0;
      border-bottom: 1px dashed #f0f0f0;
      color: #555;
    }

    .recipe-card li:last-child {
      border-bottom: none;
    }

    /* Strategy 1: Optimized Lazy Video Container & Placeholder */
    .video-container {
      width: 100%;
      height: 476px;
      max-width: 267px;
      margin: 15px auto 0 auto;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .video-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #2c3e50, #1a252f);
      cursor: pointer;
      color: #fff;
      transition: opacity 0.2s;
      padding: 20px;
      text-align: center;
    }

    .video-placeholder:hover {
      opacity: 0.9;
    }

    .play-button {
      padding: 12px 20px;
      border: 2px solid #fff;
      border-radius: 25px;
      background: rgba(0, 0, 0, 0.5);
      font-size: 0.9rem;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    iframe {
      border: none;
      overflow: hidden;
      width: 100%;
      height: 100%;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .app-container {
        flex-direction: column;
      }
      aside {
        width: 100%;
        height: auto;
        position: relative;
        padding: 20px;
        border-right: none;
        border-bottom: 1px solid #e0e0e0;
      }
      .filter-btn {
        display: inline-block;
        width: auto;
        margin-right: 5px;
      }
      main {
        padding: 20px;
      }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <aside>
      <h2>Categories</h2>
      <div id="tag-filters">
        <button class="filter-btn active" onclick="filterRecipes('All', this)">All Recipes</button>
        </div>
    </aside>

    <main>
      <header>
        <h1>The Shire Kitchen</h1>
        <p>Centralized recipe index & video archives</p>
      </header>

      <section class="recipes-grid" id="recipes-display">
        </section>
    </main>
  </div>

  <script src="recipes.js"></script>

  <script>
    // Fallback if recipes.js doesn't load or array name differs
    const recipes = typeof recipeData !== 'undefined' ? recipeData : [];

    // Initialize the Webpage
    document.addEventListener("DOMContentLoaded", () => {
      generateSidebarTags();
      renderRecipes(recipes);
    });

    // Extract tags cleanly and build the sidebar
    function generateSidebarTags() {
      const tagContainer = document.getElementById("tag-filters");
      const allTags = new Set();
      
      recipes.forEach(recipe => {
        if (recipe.tags) {
          recipe.tags.forEach(tag => allTags.add(tag));
        }
      });

      // Sort alphabetically and create selector buttons
      Array.from(allTags).sort().forEach(tag => {
        const btn = document.createElement("button");
        btn.className = "filter-btn";
        btn.textContent = `${tag}`;
        btn.onclick = (e) => filterRecipes(tag, btn);
        tagContainer.appendChild(btn);
      });
    }

    // Filter Trigger Logic
    function filterRecipes(selectedTag, element) {
      // Manage active visual state in sidebar
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      element.classList.add('active');

      if (selectedTag === 'All') {
        renderRecipes(recipes);
      } else {
        const filtered = recipes.filter(r => r.tags && r.tags.includes(selectedTag));
        renderRecipes(filtered);
      }
    }

    // Main UI Render Loop
    function renderRecipes(recipeArray) {
      const displayGrid = document.getElementById("recipes-display");
      displayGrid.innerHTML = "";

      if (recipeArray.length === 0) {
        displayGrid.innerHTML = "<p>No recipes found matching this selection.</p>";
        return;
      }

      recipeArray.forEach((recipe, index) => {
        const hasVideo = recipe.embedUrl && recipe.embedUrl.trim() !== "";
        const card = document.createElement("div");
        card.className = "recipe-card";

        card.innerHTML = `
          <div class="recipe-card-header">
            <h3>${recipe.name || "Unnamed Recipe"}</h3>
            <div class="card-tags">
              ${recipe.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}
            </div>
            <ul>
              ${recipe.ingredients.map(i => `<li>${i}</li>`).join('')}
            </ul>
          </div>
          
          ${hasVideo ? `
            <div class="video-container" id="video-container-${index}">
              <div class="video-placeholder" onclick="loadActualVideo('${btoa(recipe.embedUrl)}', ${index})">
                <div class="play-button">▶ Watch Video</div>
              </div>
            </div>
          ` : ''}
        `;
        displayGrid.appendChild(card);
      });
    }

    // Strategy 1 Execution: Instantiates video iframe strictly on user interaction
    function loadActualVideo(encodedUrl, index) {
      const decodedUrl = atob(encodedUrl);
      const container = document.getElementById(`video-container-${index}`);
      
      container.innerHTML = `
        <iframe 
          src="${decodedUrl}" 
          scrolling="no" 
          frameborder="0" 
          allowfullscreen="true" 
          allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share">
        </iframe>
      `;
    }
  </script>
</body>
</html>
