<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Centralized Recipe Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-emerald-600 mb-2">🍽️ Recipe Hub</h1>
            <p class="text-gray-600">A centralized collection of my favorite video recipes</p>
        </header>

        <section class="mb-8">
            <h2 class="text-sm font-semibold uppercase tracking-wider text-gray-500 mb-3">Filter by Ingredient / Category:</h2>
            <div id="filter-buttons" class="flex flex-wrap gap-2">
                <button onclick="filterRecipes('All')" class="px-4 py-2 rounded-full bg-emerald-600 text-white font-medium text-sm transition shadow-sm hover:bg-emerald-700">All</button>
            </div>
        </section>

        <main id="recipes-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 items-start">
            </main>
    </div>

    <script src="recipes.js"></script>
    
    <script>
        // 1. Gather all unique tags from the data to build filter buttons dynamically
        const allTags = new Set();
        recipeData.forEach(recipe => recipe.tags.forEach(tag => allTags.add(tag)));
        
        const buttonContainer = document.getElementById('filter-buttons');
        Array.from(allTags).sort().forEach(tag => {
            const btn = document.createElement('button');
            btn.innerText = tag;
            btn.className = "px-4 py-2 rounded-full bg-white text-gray-700 border border-gray-200 font-medium text-sm transition hover:bg-gray-100 shadow-sm";
            btn.onclick = () => filterRecipes(tag, btn);
            buttonContainer.appendChild(btn);
        });

        // 2. Function to display the cards
        function renderRecipes(recipes) {
            const grid = document.getElementById('recipes-grid');
            grid.innerHTML = ''; 

            recipes.forEach((recipe, index) => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden p-5 flex flex-col justify-between transition transform hover:shadow-lg";
                
                const tagsHTML = recipe.tags.map(t => `<span class="bg-gray-100 text-gray-600 text-xs px-2.5 py-1 rounded-md font-medium">${t}</span>`).join(' ');
                
                // Build the ingredients list HTML items
                const ingredientsHTML = recipe.ingredients && recipe.ingredients.length > 0
                    ? recipe.ingredients.map(ing => `<li class="flex items-center gap-2">🔹 ${ing}</li>`).join('')
                    : '<li>No ingredients listed.</li>';

                card.innerHTML = `
                    <div>
                        <button onclick="toggleIngredients(${index})" class="w-full text-left font-bold text-gray-900 text-lg mb-2 flex justify-between items-center group focus:outline-none">
                            <span class="group-hover:text-emerald-600 transition">${recipe.name}</span>
                            <span id="arrow-${index}" class="text-gray-400 transition-transform duration-200 text-sm">▼</span>
                        </button>
                        
                        <div class="flex flex-wrap gap-1.5 mb-4">
                            ${tagsHTML}
                        </div>

                        <div id="ingredients-${index}" class="hidden border-t border-gray-100 pt-3 mt-2 mb-4">
                            <h4 class="text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">Ingredients:</h4>
                            <ul class="text-sm text-gray-600 space-y-1">
                                ${ingredientsHTML}
                            </ul>
                        </div>
                    </div>
                    <a href="${recipe.link}" target="_blank" class="w-full text-center bg-emerald-50 hover:bg-emerald-100 text-emerald-700 font-semibold py-2 px-4 rounded-lg transition text-sm flex items-center justify-center gap-2">
                        <span>📺 Watch Video</span>
                    </a>
                `;
                grid.appendChild(card);
            });
        }

        // 4. Toggle Dropdown Function
        function toggleIngredients(index) {
            const panel = document.getElementById(`ingredients-${index}`);
            const arrow = document.getElementById(`arrow-${index}`);
            
            if (panel.classList.contains('hidden')) {
                panel.classList.remove('hidden');
                arrow.style.transform = 'rotate(180deg)';
            } else {
                panel.classList.add('hidden');
                arrow.style.transform = 'rotate(0deg)';
            }
        }

        // 3. Filtering Logic
        function filterRecipes(tag, activeBtn) {
            const buttons = buttonContainer.querySelectorAll('button');
            buttons.forEach(btn => {
                btn.className = "px-4 py-2 rounded-full bg-white text-gray-700 border border-gray-200 font-medium text-sm transition hover:bg-gray-100 shadow-sm";
            });
            
            if (tag === 'All') {
                buttons[0].className = "px-4 py-2 rounded-full bg-emerald-600 text-white font-medium text-sm transition shadow-sm hover:bg-emerald-700";
                renderRecipes(recipeData);
            } else {
                if (activeBtn) {
                    activeBtn.className = "px-4 py-2 rounded-full bg-emerald-600 text-white font-medium text-sm transition shadow-sm hover:bg-emerald-700";
                }
                const filtered = recipeData.filter(recipe => recipe.tags.includes(tag));
                renderRecipes(filtered);
            }
        }

        // Initial render on page load
        renderRecipes(recipeData);
    </script>
</body>
</html>
