<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Shire - Recipe Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-stone-50 text-stone-800 dark:bg-stone-950 dark:text-stone-100 font-sans min-h-screen transition-colors duration-200">

    <header class="text-center pt-10 pb-4 max-w-7xl mx-auto px-4 relative">
        <button onclick="toggleTheme()" class="absolute top-4 right-4 p-2.5 rounded-xl bg-white dark:bg-stone-900 border border-stone-200 dark:border-stone-800 shadow-sm hover:bg-stone-100 dark:hover:bg-stone-800 transition focus:outline-none" title="Toggle Theme">
            <span id="theme-icon" class="text-lg">🌙</span>
        </button>

        <h1 class="text-4xl font-extrabold text-emerald-800 dark:text-emerald-500 mb-2 tracking-wide">🏡 The Shire</h1>
        <p class="text-stone-600 dark:text-stone-400 font-medium mb-3">"One vegetarian cookbook to rule them all, for Breakfast, Second Breakfast, and Elevenses."</p>
        
        <div id="recipe-counter" class="inline-block px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider bg-stone-200/60 dark:bg-stone-900 text-stone-500 dark:text-stone-400 border border-stone-300/40 dark:border-stone-800">
            Loading total ledger...
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 mb-4 md:hidden">
        <button onclick="toggleMobileFilters()" class="w-full flex items-center justify-center gap-2 bg-emerald-800 hover:bg-emerald-900 text-white font-semibold py-2.5 px-4 rounded-xl shadow-sm transition">
            <span>🔍</span>
            <span id="mobile-filter-btn-text">Show Filter Provisions</span>
        </button>
    </div>

    <div class="max-w-7xl mx-auto px-4 pb-8 flex flex-col md:flex-row gap-8">
        
        <aside id="filter-sidebar" class="hidden md:block w-full md:w-64 shrink-0 bg-white dark:bg-stone-900 rounded-xl shadow-sm border border-stone-200/60 dark:border-stone-800 p-5 self-start transition-colors duration-200">
            <section>
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xs font-bold uppercase tracking-wider text-stone-400 dark:text-stone-500">Filter Provisions:</h2>
                    <button onclick="clearAllFilters()" class="text-xs text-emerald-700 dark:text-emerald-400 hover:underline font-semibold">Clear All</button>
                </div>
                <div id="filter-container" class="space-y-1.5"></div>
            </section>
        </aside>

        <div class="flex-1">
            <div id="active-chips-bar" class="flex flex-wrap items-center gap-2 mb-6 hidden">
                <span class="text-xs text-stone-400 dark:text-stone-500 font-medium uppercase tracking-wider">Active Filters:</span>
                <div id="chips-container" class="flex flex-wrap gap-1.5"></div>
            </div>

            <main id="recipes-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 items-start"></main>
        
            <div id="load-more-container" class="mt-12 mb-6 text-center hidden">
                <button onclick="loadMoreRecipes()" class="inline-flex items-center gap-2 bg-white dark:bg-stone-900 text-emerald-800 dark:text-emerald-400 font-bold px-6 py-3 border border-stone-200 dark:border-stone-800 rounded-xl shadow-sm hover:bg-stone-100 dark:hover:bg-stone-800 transition focus:outline-none">
                    <span>📜</span> See More Provisions
                </button>
            </div>

            <div id="empty-state" class="hidden text-center py-16 bg-white dark:bg-stone-900 rounded-xl border border-dashed border-stone-200 dark:border-stone-800">
                <span class="text-4xl block mb-2">📜</span>
                <h3 class="text-lg font-bold text-stone-700 dark:text-stone-300">Not all those who wander are lost...</h3>
                <p class="text-sm text-stone-400 dark:text-stone-500 mt-1">But this specific ingredient combination is. Try resetting your filters!</p>
            </div>
        </div>

    </div>

    <button id="back-to-top" onclick="scrollToTop()" class="fixed bottom-6 right-6 z-50 p-3 rounded-full bg-white dark:bg-stone-900 border border-stone-200 dark:border-stone-800 shadow-md hover:bg-stone-100 dark:hover:bg-stone-800 text-stone-600 dark:text-stone-400 hover:text-emerald-800 dark:hover:text-emerald-400 transition-all duration-300 translate-y-10 opacity-0 pointer-events-none focus:outline-none" title="Return to Top">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 10l7-7m0 0l7 7m-7-7v18" />
        </svg>
    </button>

    <script src="recipes.js"></script>
    
    <script>
        const selectedTags = new Set();
        
        let recipesVisibleLimit = 42; 
        const itemsToAppend = 9;

        // Theme Toggle Handler
        function updateThemeUI() {
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('theme-icon').innerText = isDark ? '☀️' : '🌙';
        }

        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
            updateThemeUI();
        }

        updateThemeUI();

        // Scroll Visibility Logic for Back to Top Button
        const topBtn = document.getElementById('back-to-top');
        window.onscroll = function() {
            if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
                topBtn.classList.remove('translate-y-10', 'opacity-0', 'pointer-events-none');
                topBtn.classList.add('translate-y-0', 'opacity-100', 'pointer-events-auto');
            } else {
                topBtn.classList.remove('translate-y-0', 'opacity-100', 'pointer-events-auto');
                topBtn.classList.add('translate-y-10', 'opacity-0', 'pointer-events-none');
            }
        };

        function scrollToTop() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }

        // 1. Extract unique tags and build the sidebar filter menu
        const allTags = new Set();
        recipeData.forEach(recipe => recipe.tags.forEach(tag => allTags.add(tag)));
        
        const filterContainer = document.getElementById('filter-container');
        
        Array.from(allTags).sort().forEach(tag => {
            const label = document.createElement('label');
            label.className = "flex items-center justify-between w-full px-3 py-2 rounded-lg text-sm text-stone-600 dark:text-stone-400 font-medium cursor-pointer transition hover:bg-stone-50 dark:hover:bg-stone-800 select-none border border-transparent";
            label.id = `label-${tag}`;
            
            label.innerHTML = `
                <div class="flex items-center gap-2.5">
                    <input type="checkbox" id="check-${tag}" onchange="toggleTagFilter('${tag}')" class="w-4 h-4 rounded text-emerald-700 focus:ring-emerald-600 border-stone-300 dark:border-stone-700 dark:bg-stone-800 accent-emerald-700 dark:accent-emerald-500">
                    <span>${tag}</span>
                </div>
                <span class="text-xs text-stone-400 dark:text-stone-500 font-normal">( ${countTagOccurrences(tag)} )</span>
            `;
            filterContainer.appendChild(label);
        });

        function countTagOccurrences(tag) {
            return recipeData.filter(r => r.tags.includes(tag)).length;
        }

        function loadMoreRecipes() {
            recipesVisibleLimit += itemsToAppend;
            renderRecipes();
        }

        // 2. Render Recipes based on current active tags and active slice limit
        function renderRecipes() {
            const grid = document.getElementById('recipes-grid');
            const emptyState = document.getElementById('empty-state');
            const loadMoreBar = document.getElementById('load-more-container');
            const counterBadge = document.getElementById('recipe-counter');
            grid.innerHTML = ''; 

            const filteredRecipes = recipeData.filter(recipe => {
                if (selectedTags.size === 0) return true;
                return Array.from(selectedTags).every(tag => recipe.tags.includes(tag));
            });

            // Dynamic Counter Display Update Logic
            if (selectedTags.size === 0) {
                counterBadge.innerText = `Total: ${recipeData.length} Recipes Available`;
            } else {
                counterBadge.innerText = `Showing ${filteredRecipes.length} of ${recipeData.length} Recipes`;
            }

            if (filteredRecipes.length === 0) {
                grid.className = "hidden";
                emptyState.classList.remove('hidden');
                loadMoreBar.classList.add('hidden');
                return;
            } else {
                grid.className = "grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 items-start";
                emptyState.classList.add('hidden');
            }

            const paginatedRecipes = filteredRecipes.slice(0, recipesVisibleLimit);

            if (filteredRecipes.length > recipesVisibleLimit) {
                loadMoreBar.classList.remove('hidden');
            } else {
                loadMoreBar.classList.add('hidden');
            }

            paginatedRecipes.forEach((recipe, index) => {
                const card = document.createElement('div');
                card.className = "bg-white dark:bg-stone-900 rounded-xl shadow-sm border border-stone-100 dark:border-stone-800/60 overflow-hidden p-5 flex flex-col justify-between transition transform hover:shadow-md";
                
                const tagsHTML = recipe.tags.map(t => `<span class="bg-stone-100 dark:bg-stone-800 text-stone-600 dark:text-stone-300 text-xs px-2.5 py-1 rounded-md font-semibold">${t}</span>`).join(' ');
                
                const ingredientsHTML = recipe.ingredients && recipe.ingredients.length > 0
                    ? recipe.ingredients.map(ing => `<li class="flex items-center gap-2">🌿 ${ing}</li>`).join('')
                    : '<li>No ingredients listed.</li>';

                let videoEmbedHTML = '';
                
                if (recipe.embedUrl && recipe.embedUrl.trim() !== "") {
                    videoEmbedHTML = `
                        <div class="mt-4">
                            <h4 class="text-xs font-bold uppercase tracking-wider text-stone-400 dark:text-stone-500 mb-2">Recipe Video:</h4>
                            <div class="flex justify-center rounded-lg overflow-hidden bg-stone-900 border border-stone-200 dark:border-stone-800 p-2" id="video-container-${index}">
                                <div onclick="loadActualVideo('${btoa(recipe.embedUrl)}', ${index})" class="w-[267px] h-[476px] flex items-center justify-center bg-gradient-to-br from-stone-800 to-stone-950 cursor-pointer text-white rounded-md transition hover:opacity-90 text-center p-4">
                                    <div class="px-4 py-2.5 border border-white/40 rounded-full bg-black/40 text-xs font-bold tracking-wide shadow-sm">▶ Load & Watch Video</div>
                                </div>
                            </div>
                        </div>`;
                } else if (recipe.link && (recipe.link.includes('youtube.com/watch') || recipe.link.includes('youtu.be/'))) {
                    let videoId = recipe.link.includes('youtu.be/') ? recipe.link.split('/').pop() : new URL(recipe.link).searchParams.get('v');
                    videoEmbedHTML = `
                        <div class="mt-4 rounded-lg overflow-hidden border border-stone-200 dark:border-stone-800 aspect-video">
                            <iframe class="w-full h-full" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>
                        </div>`;
                } else if (recipe.link) {
                    videoEmbedHTML = `
                        <div class="mt-4">
                            <h4 class="text-xs font-bold uppercase tracking-wider text-stone-400 dark:text-stone-500 mb-1.5">Recipe Video:</h4>
                            <a href="${recipe.link}" target="_blank" class="group/video block relative rounded-lg overflow-hidden border border-dashed border-emerald-300 dark:border-emerald-700 bg-emerald-50/40 dark:bg-emerald-950/20 p-4 text-center transition hover:bg-emerald-50 dark:hover:bg-emerald-950/40 hover:border-emerald-400">
                                <div class="text-2xl mb-1">🎬</div>
                                <span class="text-xs font-bold text-emerald-800 dark:text-emerald-400 block group-hover/video:underline">Watch Tutorial Reel</span>
                                <span class="text-[10px] text-stone-400 dark:text-stone-500 block mt-0.5">Opens clip in a new tab</span>
                            </a>
                        </div>`;
                }

                card.innerHTML = `
                    <div>
                        <button onclick="toggleIngredients(${index})" class="w-full text-left font-bold text-stone-900 dark:text-stone-100 text-lg mb-2 flex justify-between items-center group focus:outline-none">
                            <span class="group-hover:text-emerald-800 dark:group-hover:text-emerald-400 transition">${recipe.name}</span>
                            <span id="arrow-${index}" class="text-stone-400 dark:text-stone-500 transition-transform duration-200 text-sm">▼</span>
                        </button>
                        
                        <div class="flex flex-wrap gap-1.5 mb-2">
                            ${tagsHTML}
                        </div>

                        <div id="ingredients-${index}" class="hidden border-t border-stone-100 dark:border-stone-800/80 pt-3 mt-3">
                            <h4 class="text-xs font-bold uppercase tracking-wider text-stone-400 dark:text-stone-500 mb-2">Ingredients:</h4>
                            <ul class="text-sm text-stone-600 dark:text-stone-400 space-y-1 mb-2">
                                ${ingredientsHTML}
                            </ul>
                            ${videoEmbedHTML}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function loadActualVideo(encodedUrl, index) {
            const decodedUrl = atob(encodedUrl);
            const container = document.getElementById(`video-container-${index}`);
            container.innerHTML = `
                <iframe src="${decodedUrl}" width="267" height="476" style="border:none;overflow:hidden" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"></iframe>
            `;
        }

        // 3. Handle toggling selections on/off
        function toggleTagFilter(tag) {
            const checkbox = document.getElementById(`check-${tag}`);
            const label = document.getElementById(`label-${tag}`);

            recipesVisibleLimit = 42;

            if (checkbox.checked) {
                selectedTags.add(tag);
                label.className = "flex items-center justify-between w-full px-3 py-2 rounded-lg text-sm font-bold cursor-pointer transition bg-emerald-50 dark:bg-emerald-950/30 text-emerald-800 dark:text-emerald-400 border border-emerald-100 dark:border-emerald-900/60 select-none";
            } else {
                selectedTags.delete(tag);
                label.className = "flex items-center justify-between w-full px-3 py-2 rounded-lg text-sm text-stone-600 dark:text-stone-400 font-medium cursor-pointer transition hover:bg-stone-50 dark:hover:bg-stone-800 select-none border border-transparent";
            }

            updateChipsBar();
            renderRecipes();
        }

        // 4. Update visual chips
        function updateChipsBar() {
            const bar = document.getElementById('active-chips-bar');
            const container = document.getElementById('chips-container');
            container.innerHTML = '';

            if (selectedTags.size === 0) {
                bar.classList.add('hidden');
                return;
            }

            bar.classList.remove('hidden');
            selectedTags.forEach(tag => {
                const chip = document.createElement('span');
                chip.className = "inline-flex items-center gap-1 bg-emerald-800 dark:bg-emerald-700 text-white text-xs font-semibold px-2.5 py-1 rounded-md shadow-sm";
                chip.innerHTML = `
                    ${tag}
                    <button onclick="removeSingleChip('${tag}')" class="hover:bg-emerald-900 dark:hover:bg-emerald-800 rounded p-0.5 text-[10px] leading-none font-bold">✕</button>
                `;
                container.appendChild(chip);
            });
        }

        function removeSingleChip(tag) {
            document.getElementById(`check-${tag}`).checked = false;
            toggleTagFilter(tag);
        }

        function clearAllFilters() {
            recipesVisibleLimit = 42; 
            selectedTags.forEach(tag => {
                document.getElementById(`check-${tag}`).checked = false;
            });
            selectedTags.clear();
            
            const labels = filterContainer.querySelectorAll('label');
            labels.forEach(lbl => {
                lbl.className = "flex items-center justify-between w-full px-3 py-2 rounded-lg text-sm text-stone-600 dark:text-stone-400 font-medium cursor-pointer transition hover:bg-stone-50 dark:hover:bg-stone-800 select-none border border-transparent";
            });

            updateChipsBar();
            renderRecipes();
        }

        // 5. Toggle Card Dropdowns
        function toggleIngredients(index) {
            const panel = document.getElementById(`ingredients-${index}`);
            const arrow = document.getElementById(`arrow-${index}`);
            
            if (panel.classList.contains('hidden')) {
                panel.classList.remove('hidden');
                arrow.style.transform = 'rotate(180deg)';
            } else {
                panel.classList.add('hidden');
                arrow.style.transform = 'rotate(0deg)';
            }
        }

        // 6. Mobile Drawer Toggle Logic
        function toggleMobileFilters() {
            const sidebar = document.getElementById('filter-sidebar');
            const btnText = document.getElementById('mobile-filter-btn-text');
            
            if (sidebar.classList.contains('hidden')) {
                sidebar.classList.remove('hidden');
                btnText.innerText = "Hide Filter Provisions";
            } else {
                sidebar.classList.add('hidden');
                btnText.innerText = "Show Filter Provisions";
            }
        }

        renderRecipes();
    </script>
</body>
</html>
